# Example config for MINGUS.
# Run from repo root:
#   pipelines/generation-pipeline/.venv/bin/python \
#       pipelines/generation-pipeline/runners/run.py \
#       pipelines/generation-pipeline/runners/example_configs/mingus.yaml \
#       --input pipelines/generation-pipeline/inputs/musicxml/Autumn_Leaves.musicxml \
#       --output-dir pipelines/generation-pipeline/outputs/mingus/example_run
model: mingus

output:
  formats: [midi, musicxml, musicxml_with_chords]
  force_overwrite: true

common:
  seed: 1
  input_bars: 32
  output_bars: 32
  device: cpu

mingus:
  fork_root: models/MINGUS
  data_path: models/MINGUS/A_preprocessData/data/DATA.json
  checkpoint_dir: models/MINGUS/B_train/models/paper-optimal
  epochs: 10
  cond_pitch: D-C-B-BE-O
  cond_duration: B-BE-O
  temperature: 1.0
