# Example config for CMT.
# Run from repo root:
#   pipelines/generation-pipeline/.venv/bin/python \
#       pipelines/generation-pipeline/runners/run.py \
#       pipelines/generation-pipeline/runners/example_configs/cmt.yaml \
#       --input pipelines/generation-pipeline/inputs/musicxml/Autumn_Leaves_8bars.musicxml \
#       --output-dir pipelines/generation-pipeline/outputs/cmt/example_run
model: cmt

output:
  formats: [midi, musicxml, musicxml_with_chords]
  force_overwrite: true

common:
  seed: 1
  input_bars: 8
  output_bars: 8
  device: cpu

cmt:
  fork_root: models/CMT-pytorch
  hparams_yaml_path: models/CMT-pytorch/hparams_jazz_16bars.yaml
  checkpoint_path: models/CMT-pytorch/result/paper/16bars/best_jazz_model_16bars.pth.tar
  topk: 5
